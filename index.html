<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PDF 浮水印工具</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f3ef;
      --surface: #ffffff;
      --border: #e2ddd6;
      --accent: #4a6fa5;
      --accent-hover: #3a5a8a;
      --accent-light: #eef1f7;
      --text: #2d2a26;
      --text-muted: #7a756e;
      --radius: 10px;
    }

    body {
      font-family: "PingFang SC", "Microsoft JhengHei", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 13px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    header h1 {
      font-size: 16px;
      font-weight: 600;
      letter-spacing: 0.03em;
      color: var(--accent);
    }

    .header-actions {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 18px;
      border-radius: var(--radius);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      border: none;
      transition: all 0.15s;
      text-decoration: none;
    }

    .btn:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .btn-primary {
      background: var(--accent);
      color: #fff;
    }

    .btn-primary:not(:disabled):hover {
      background: var(--accent-hover);
    }

    .btn-secondary {
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
    }

    .btn-secondary:not(:disabled):hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .layout {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── Sidebar ── */
    .sidebar {
      width: 300px;
      flex-shrink: 0;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      padding: 20px;
      gap: 18px;
    }

    .upload-zone {
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      padding: 28px 16px;
      text-align: center;
      cursor: pointer;
      transition: all 0.15s;
    }

    .upload-zone:hover, .upload-zone.drag-over {
      border-color: var(--accent);
      background: var(--accent-light);
    }

    .upload-zone .icon {
      font-size: 36px;
      margin-bottom: 8px;
    }

    .upload-zone p {
      font-size: 13px;
      color: var(--text-muted);
      line-height: 1.5;
    }

    .upload-zone .hint {
      font-size: 11px;
      color: #b0a99e;
      margin-top: 4px;
    }

    .section-title {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    .text-input-wrap {
      position: relative;
    }

    textarea {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-size: 13px;
      font-family: inherit;
      background: var(--bg);
      color: var(--text);
      resize: vertical;
      min-height: 72px;
      outline: none;
      transition: border-color 0.15s;
      line-height: 1.5;
    }

    textarea:focus {
      border-color: var(--accent);
    }

    .char-count {
      font-size: 11px;
      color: var(--text-muted);
      text-align: right;
      margin-top: 4px;
    }

    .option-row {
      display: flex;
      gap: 10px;
    }

    .option-field {
      flex: 1;
    }

    .option-field label {
      font-size: 12px;
      color: var(--text-muted);
      display: block;
      margin-bottom: 5px;
    }

    input[type="text"],
    input[type="number"],
    select {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-size: 12px;
      font-family: inherit;
      background: var(--bg);
      color: var(--text);
      outline: none;
      transition: border-color 0.15s;
    }

    input[type="text"]:focus,
    input[type="number"]:focus,
    select:focus {
      border-color: var(--accent);
    }

    input[type="range"] {
      width: 100%;
      accent-color: var(--accent);
      cursor: pointer;
    }

    .range-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .range-row span {
      font-size: 12px;
      color: var(--text-muted);
      min-width: 32px;
      text-align: right;
    }

    .color-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .color-row input[type="color"] {
      width: 36px;
      height: 32px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      cursor: pointer;
      padding: 2px;
      background: var(--surface);
    }

    .color-row .color-label {
      font-size: 12px;
      color: var(--text-muted);
    }

    .file-info {
      background: var(--accent-light);
      border-radius: var(--radius);
      padding: 12px 14px;
      font-size: 12px;
    }

    .file-info .file-name {
      font-weight: 500;
      color: var(--accent);
      word-break: break-all;
      margin-bottom: 4px;
    }

    .file-info .file-meta {
      color: var(--text-muted);
    }

    /* ── Preview ── */
    .preview-area {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      background: #e8e5df;
    }

    .preview-empty {
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      gap: 10px;
    }

    .preview-empty .icon {
      font-size: 52px;
      opacity: 0.35;
    }

    .preview-empty p {
      font-size: 14px;
    }

    .preview-empty .hint {
      font-size: 12px;
      color: #b0a99e;
    }

    .pages-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    .page-wrapper {
      position: relative;
      background: #fff;
      box-shadow: 0 2px 16px rgba(0,0,0,0.12);
      line-height: 0;
    }

    .page-wrapper canvas {
      display: block;
    }

    .page-number {
      position: absolute;
      bottom: -22px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 11px;
      color: var(--text-muted);
    }

    /* loading */
    .loading-overlay {
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,0.85);
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: var(--radius);
    }

    .spinner {
      width: 28px;
      height: 28px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .page-loading {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f9f8f6;
    }
  </style>
</head>
<body>

<header>
  <h1>📄 PDF 浮水印工具</h1>
  <div class="header-actions">
    <button class="btn btn-secondary" id="btn-reset" disabled>清除</button>
    <button class="btn btn-primary" id="btn-download" disabled>⬇ 下載浮水印 PDF</button>
  </div>
</header>

<div class="layout">

  <!-- Sidebar -->
  <aside class="sidebar">

    <div id="upload-zone" class="upload-zone">
      <div class="icon">📂</div>
      <p>拖放 PDF 到這裡<br>或點擊上傳</p>
      <p class="hint">支援單一或多頁 PDF</p>
    </div>
    <input type="file" id="file-input" accept=".pdf" style="display:none">

    <div id="file-info" class="file-info" style="display:none">
      <div class="file-name" id="file-name"></div>
      <div class="file-meta" id="file-meta"></div>
    </div>

    <div class="option-section">
      <div class="section-title">浮水印文字</div>
      <div class="text-input-wrap">
        <textarea id="watermark-text" placeholder="輸入浮水印文字，例如：機密文件、練習用…" rows="3">機密文件</textarea>
      </div>
      <div class="char-count" id="char-count">5 / 100</div>
    </div>

    <div class="option-section">
      <div class="section-title">字體大小</div>
      <div class="range-row">
        <input type="range" id="font-size" min="12" max="120" value="48">
        <span id="font-size-val">48px</span>
      </div>
    </div>

    <div class="option-section">
      <div class="section-title">透明度</div>
      <div class="range-row">
        <input type="range" id="opacity" min="5" max="100" value="20">
        <span id="opacity-val">20%</span>
      </div>
    </div>

    <div class="option-section">
      <div class="section-title">旋轉角度</div>
      <div class="range-row">
        <input type="range" id="rotation" min="-90" max="90" value="-30">
        <span id="rotation-val">-30°</span>
      </div>
    </div>

    <div class="option-section">
      <div class="section-title">浮水印顏色</div>
      <div class="color-row">
        <input type="color" id="color" value="#888888">
        <span class="color-label" id="color-label">#888888</span>
      </div>
    </div>

  </aside>

  <!-- Preview -->
  <main class="preview-area" id="preview-area">
    <div class="preview-empty" id="preview-empty">
      <div class="icon">📄</div>
      <p>尚未上傳 PDF</p>
      <span class="hint">上傳後右側會即時預覽浮水印效果</span>
    </div>
    <div class="pages-container" id="pages-container" style="display:none"></div>
  </main>

</div>

<!-- PDF.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
pdfjsLib.GlobalWorkerOptions.workerSrc =
  'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
</script>

<!-- pdf-lib for watermark PDF generation -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>

<script>
// ── State ──
let pdfDoc = null;
let pdfBytes = null;
let pageCount = 0;
let renderTasks = [];

// ── Elements ──
const uploadZone = document.getElementById('upload-zone');
const fileInput = document.getElementById('file-input');
const fileInfo = document.getElementById('file-info');
const fileName = document.getElementById('file-name');
const fileMeta = document.getElementById('file-meta');
const previewEmpty = document.getElementById('preview-empty');
const pagesContainer = document.getElementById('pages-container');
const btnDownload = document.getElementById('btn-download');
const btnReset = document.getElementById('btn-reset');
const wmText = document.getElementById('watermark-text');
const charCount = document.getElementById('char-count');
const fontSize = document.getElementById('font-size');
const fontSizeVal = document.getElementById('font-size-val');
const opacity = document.getElementById('opacity');
const opacityVal = document.getElementById('opacity-val');
const rotation = document.getElementById('rotation');
const rotationVal = document.getElementById('rotation-val');
const colorPicker = document.getElementById('color');
const colorLabel = document.getElementById('color-label');

// ── Upload ──
uploadZone.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', e => { if (e.target.files[0]) loadPDF(e.target.files[0]); });

uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('drag-over'); });
uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('drag-over'));
uploadZone.addEventListener('drop', e => {
  e.preventDefault();
  uploadZone.classList.remove('drag-over');
  const f = e.dataTransfer.files[0];
  if (f && f.type === 'application/pdf') loadPDF(f);
  else alert('請上傳 PDF 檔案');
});

async function loadPDF(file) {
  // Cancel any ongoing renders
  renderTasks.forEach(t => t?.cancel());
  renderTasks = [];

  const arrayBuffer = await file.arrayBuffer();
  pdfBytes = new Uint8Array(arrayBuffer);
  pdfDoc = await pdfjsLib.getDocument({ data: pdfBytes.slice() }).promise;
  pageCount = pdfDoc.numPages;

  fileName.textContent = file.name;
  fileMeta.textContent = `${pageCount} 頁 · ${(file.size / 1024).toFixed(1)} KB`;
  fileInfo.style.display = 'block';

  btnDownload.disabled = false;
  btnReset.disabled = false;
  previewEmpty.style.display = 'none';
  pagesContainer.style.display = 'flex';
  pagesContainer.innerHTML = '';

  renderAllPages();
}

function renderAllPages() {
  for (let i = 1; i <= pageCount; i++) {
    const wrapper = document.createElement('div');
    wrapper.className = 'page-wrapper';
    wrapper.id = `page-wrap-${i}`;

    const canvas = document.createElement('canvas');
    const pageNum = document.createElement('div');
    pageNum.className = 'page-number';
    pageNum.textContent = `第 ${i} 頁 / 共 ${pageCount} 頁`;

    wrapper.appendChild(canvas);
    wrapper.appendChild(pageNum);
    pagesContainer.appendChild(wrapper);

    renderPage(i, canvas);
  }
}

async function renderPage(pageNum, canvas) {
  const page = await pdfDoc.getPage(pageNum);
  const scale = 1.5;
  const viewport = page.getViewport({ scale });

  canvas.width = viewport.width;
  canvas.height = viewport.height;
  const ctx = canvas.getContext('2d');

  // Cancel previous render task for this page if any
  const task = page.render({ canvasContext: ctx, viewport });
  renderTasks[pageNum] = task;

  try {
    await task.promise;
  } catch (e) {
    if (e?.name !== 'RenderingCancelledException') console.warn('Render error:', e);
    return;
  }

  // Overlay watermark
  drawWatermark(ctx, canvas.width, canvas.height);
}

function drawWatermark(ctx, w, h) {
  const text = wmText.value.trim();
  if (!text) return;

  const size = parseInt(fontSize.value);
  const alpha = parseInt(opacity.value) / 100;
  const angle = parseInt(rotation.value) * Math.PI / 180;
  const color = colorPicker.value;

  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.fillStyle = color;
  ctx.font = `bold ${size}px sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  ctx.translate(w / 2, h / 2);
  ctx.rotate(angle);
  ctx.fillText(text, 0, 0);
  ctx.restore();
}

function reRenderAll() {
  // Redraw watermark on existing canvases
  document.querySelectorAll('.page-wrapper canvas').forEach(canvas => {
    const ctx = canvas.getContext('2d');
    // Re-render is expensive, just overlay watermark on top
    // The canvases already have the PDF rendered; we overlay watermark
    drawWatermark(ctx, canvas.width, canvas.height);
  });
}

// ── Live controls ──
wmText.addEventListener('input', () => {
  charCount.textContent = `${wmText.value.length} / 100`;
  reRenderAll();
});

fontSize.addEventListener('input', () => {
  fontSizeVal.textContent = fontSize.value + 'px';
  reRenderAll();
});

opacity.addEventListener('input', () => {
  opacityVal.textContent = opacity.value + '%';
  reRenderAll();
});

rotation.addEventListener('input', () => {
  rotationVal.textContent = rotation.value + '°';
  reRenderAll();
});

colorPicker.addEventListener('input', () => {
  colorLabel.textContent = colorPicker.value;
  reRenderAll();
});

// ── Download watermarked PDF ──
async function downloadWatermarked() {
  if (!pdfBytes) return;

  btnDownload.disabled = true;
  btnDownload.textContent = '⏳ 處理中…';

  try {
    const { PDFDocument, rgb, degrees } = PDFLib;
    const pdfLibDoc = await PDFDocument.load(pdfBytes);
    const pages = pdfLibDoc.getPages();
    const text = wmText.value.trim();
    const size = parseInt(fontSize.value);
    const alpha = parseInt(opacity.value) / 100;
    const angle = parseInt(rotation.value);
    const colorHex = colorPicker.value;

    // Parse hex color to RGB 0-1
    const r = parseInt(colorHex.slice(1,3), 16) / 255;
    const g = parseInt(colorHex.slice(3,5), 16) / 255;
    const b = parseInt(colorHex.slice(5,7), 16) / 255;

    for (const page of pages) {
      const { width, height } = page.getSize();
      page.drawText(text, {
        x: width / 2,
        y: height / 2,
        size,
        color: rgb(r, g, b),
        opacity: alpha,
        rotate: degrees(angle),
        anchor: 'middle',
      });
    }

    const watermarkedBytes = await pdfLibDoc.save();
    const blob = new Blob([watermarkedBytes], { type: 'application/pdf' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'watermarked.pdf';
    a.click();
    URL.revokeObjectURL(url);

    btnDownload.textContent = '✓ 已下載';
    setTimeout(() => { btnDownload.textContent = '⬇ 下載浮水印 PDF'; btnDownload.disabled = false; }, 2000);
  } catch (err) {
    console.error(err);
    btnDownload.textContent = '⬇ 下載浮水印 PDF';
    btnDownload.disabled = false;
    alert('產生浮水印 PDF 時發生錯誤：' + err.message);
  }
}

btnDownload.addEventListener('click', downloadWatermarked);

// ── Reset ──
btnReset.addEventListener('click', () => {
  pdfDoc = null;
  pdfBytes = null;
  pageCount = 0;
  renderTasks = [];

  fileInfo.style.display = 'none';
  btnDownload.disabled = true;
  btnReset.disabled = true;
  previewEmpty.style.display = 'flex';
  pagesContainer.style.display = 'none';
  pagesContainer.innerHTML = '';
  fileInput.value = '';
});

// Init char count
charCount.textContent = `${wmText.value.length} / 100`;
</script>
</body>
</html>
